<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Brand</title>
  </head>

  <body>

    <!-- Wave Animation Canvas -->
    <canvas id="wave-bg"></canvas>

    <!-- React App Root -->
    <div id="root"></div>

    <!-- Cursor Trail Circles -->
    <div class="circle"></div>
    <!-- React Script -->
    <script type="module" src="/src/main.jsx"></script>

<!-- Star & Shooting Star Animation Script -->
<script>
  window.addEventListener('load', () => {
    const canvas = document.getElementById('wave-bg');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Static Stars ──────────────────────────────────────────
    const stars = Array.from({ length: 200 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.5 + 0.3,
      alpha: 0.15,
      blinkPhase: Math.random() * Math.PI * 2,
      glowing: false,
      glowAlpha: 0,
    }));

// Every 5 seconds, pick 10 random stars and make them glow
setInterval(() => {
  // Reset all
  stars.forEach(s => { s.glowing = false; });
  // Pick 10 random
  const picked = [...stars].sort(() => 0.5 - Math.random()).slice(0, 10);
  picked.forEach(s => { s.glowing = true; s.glowAlpha = 0; });
}, 5000);

    // ── Shooting Stars & Asteroids ────────────────────────────
    const projectiles = [];

    const DIRECTIONS = [
      { name: 'right-top to left-bottom',  sx: 0.9, sy: 0.05, ex: 0.1, ey: 0.85 },
      { name: 'left-top to right-bottom',  sx: 0.1, sy: 0.05, ex: 0.9, ey: 0.85 },
      { name: 'right to left',             sx: 1.0, sy: 0.3,  ex: 0.0, ey: 0.4  },
      { name: 'left to right',             sx: 0.0, sy: 0.3,  ex: 1.0, ey: 0.4  },
    ];

    function spawnProjectile(type) {
      const dir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
      const startX = (dir.sx + (Math.random() * 0.1 - 0.05)) * W;
      const startY = (dir.sy + (Math.random() * 0.1 - 0.05)) * H;
      const endX   = (dir.ex + (Math.random() * 0.1 - 0.05)) * W;
      const endY   = (dir.ey + (Math.random() * 0.1 - 0.05)) * H;

      const dx = endX - startX;
      const dy = endY - startY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const speed = type === 'shooting' ? 6 : 4;

      projectiles.push({
        type,
        x: startX, y: startY,
        vx: (dx / dist) * speed,
        vy: (dy / dist) * speed,
        endX, endY,
        length: type === 'shooting' ? 120 : 0,
        // asteroid specific
        r: type === 'asteroid' ? Math.random() * 4 + 3 : 0,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        trail: [],
        alpha: 1,
        done: false,
      });
    }

    // Spawn every 3 seconds — alternates between shooting star and asteroid
    let spawnCount = 0;
    setInterval(() => {
      spawnProjectile(spawnCount % 2 === 0 ? 'shooting' : 'asteroid');
      spawnCount++;
    }, 5000);

    // Spawn one immediately
    setTimeout(() => spawnProjectile('shooting'), 500);
    setTimeout(() => spawnProjectile('asteroid'), 2000);

    // ── Render ────────────────────────────────────────────────
    let t = 0;
    function render() {
      t += 0.016;
      ctx.clearRect(0, 0, W, H);

      // Background — deep dark, near black
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0,    '#0a0015');
      bg.addColorStop(0.28, '#110020');
      bg.addColorStop(0.55, '#050008');
      bg.addColorStop(1,    '#000000');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // ── Draw stars ──
      stars.forEach(s => {
        // Fade in when glowing, fade out when not
        if (s.glowing) {
          s.glowAlpha = Math.min(1, s.glowAlpha + 6);
        } else {
          s.glowAlpha = Math.max(0, s.glowAlpha - 1);
        }
        const a = 0.15 + s.glowAlpha * 0.85;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        const sg = ctx.createRadialGradient(s.x*W, s.y*H, 0, s.x*W, s.y*H, s.r * 3);
        sg.addColorStop(0,   `rgba(255, 255, 255, ${a})`);
        sg.addColorStop(0.4, `rgba(200, 180, 255, ${a * 0.5})`);
        sg.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.fill();
      });

      // ── Draw shooting stars & asteroids ──
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        if (p.done) { projectiles.splice(i, 1); continue; }

        // Move
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;

        // Store trail
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 30) p.trail.shift();

        // Check if reached destination
        const dx = p.endX - p.x;
        const dy = p.endY - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < 10) {
          p.alpha -= 0.05;
          if (p.alpha <= 0) { p.done = true; continue; }
        }

        if (p.type === 'shooting') {
          // ── Shooting star: glowing streak ──
          if (p.trail.length > 1) {
            const grad = ctx.createLinearGradient(
              p.trail[0].x, p.trail[0].y, p.x, p.y
            );
            grad.addColorStop(0,   `rgba(255,255,255,0)`);
            grad.addColorStop(0.6, `rgba(200,180,255,${p.alpha * 0.4})`);
            grad.addColorStop(1,   `rgba(255,255,255,${p.alpha})`);

            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            p.trail.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.stroke();
          }

          // Head glow
          const hg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 8);
          hg.addColorStop(0,   `rgba(255,255,255,${p.alpha})`);
          hg.addColorStop(0.4, `rgba(180,140,255,${p.alpha * 0.6})`);
          hg.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
          ctx.fillStyle = hg;
          ctx.fill();

        } else {
          // ── Asteroid: rocky chunk with trail ──

          // Trail glow
          if (p.trail.length > 1) {
            const grad = ctx.createLinearGradient(
              p.trail[0].x, p.trail[0].y, p.x, p.y
            );
            grad.addColorStop(0,   'rgba(255,120,40,0)');
            grad.addColorStop(0.5, `rgba(255,160,60,${p.alpha * 0.3})`);
            grad.addColorStop(1,   `rgba(255,200,80,${p.alpha * 0.7})`);
            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            p.trail.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.strokeStyle = grad;
            ctx.lineWidth = p.r * 1.2;
            ctx.lineCap = 'round';
            ctx.stroke();
          }

          // Rocky body
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.globalAlpha = p.alpha;

          // Outer glow
          const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, p.r * 3);
          ag.addColorStop(0,   'rgba(255,180,60,0.8)');
          ag.addColorStop(0.5, 'rgba(200,80,20,0.4)');
          ag.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(0, 0, p.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = ag;
          ctx.fill();

          // Rocky irregular shape
          ctx.beginPath();
          const sides = 7;
          for (let j = 0; j < sides; j++) {
            const angle = (j / sides) * Math.PI * 2;
            const rad = p.r * (0.7 + Math.sin(j * 2.3) * 0.3);
            j === 0
              ? ctx.moveTo(Math.cos(angle) * rad, Math.sin(angle) * rad)
              : ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
          }
          ctx.closePath();
          const rb = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, 0, 0, 0, p.r);
          rb.addColorStop(0,   '#c8a060');
          rb.addColorStop(0.5, '#7a5030');
          rb.addColorStop(1,   '#3a2010');
          ctx.fillStyle = rb;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,200,100,0.4)';
          ctx.lineWidth = 0.5;
          ctx.stroke();

          ctx.globalAlpha = 1;
          ctx.restore();
        }
      }

      requestAnimationFrame(render);
    }
    render();
  }); // end window load
</script>
    <!-- Cursor Trail Script -->
    <script>
      const coords = { x: 0, y: 0 };
      const circles = document.querySelectorAll(".circle");
      let isHovering = false;

      circles.forEach(circle => {
        circle.x = 0;
        circle.y = 0;
      });

      window.addEventListener("mousemove", function (e) {
        coords.x = e.clientX;
        coords.y = e.clientY;
        if (!isHovering) animateCircles();
      });

      document.addEventListener("mouseover", (e) => {
        if (e.target.closest("button, a")) {
          isHovering = true;
          circles.forEach(c => c.style.opacity = "0");
        }
      });

      document.addEventListener("mouseout", (e) => {
        if (e.target.closest("button, a")) {
          isHovering = false;
          circles.forEach(c => c.style.opacity = "0.95");
        }
      });

      function animateCircles() {
        let x = coords.x;
        let y = coords.y;
        circles.forEach(function (circle, index) {
          circle.style.left = x - 11 + "px";
          circle.style.top  = y - 11 + "px";
          circle.x = x;
          circle.y = y;
          const nextCircle = circles[index + 1] || circles[0];
          x += (nextCircle.x - x) * 0.3;
          y += (nextCircle.y - y) * 0.3;
        });
      }
    </script>

  </body>
</html>
